AWSTemplateFormatVersion: '2010-09-09'
Description: >
  NGE IoT Blockchain Bridge — Connects AWS IoT Core to on-chain DeviceRegistry
  and DataAnchor smart contracts. Designed to run within the AWS Free Tier for
  dev/prototype workloads (~50 devices, ~$0.40/mo). See README.md for full
  cost breakdown. Key free-tier choices: DynamoDB on-demand (PAY_PER_REQUEST),
  HTTP API Gateway (not REST), minimal Lambda memory (128-256 MB).

# ──────────────────────────────────────────────
#  Parameters
# ──────────────────────────────────────────────

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]
    Description: Deployment environment

  EthRpcUrl:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /nge/iot/eth-rpc-url
    Description: Ethereum JSON-RPC endpoint (Infura/Alchemy)

  ContractAddress:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /nge/iot/contract-address
    Description: AnchoredDeviceRegistry contract address

  SignerSecretArn:
    Type: String
    Description: ARN of Secrets Manager secret containing the signer private key

  NotificationEmail:
    Type: String
    Description: Email for error notifications

  CognitoUserPoolId:
    Type: String
    Description: Cognito User Pool ID for JWT issuer (from cognito-auth stack export)
    Default: ''

  CognitoClientId:
    Type: String
    Description: Cognito User Pool Client ID for JWT audience validation
    Default: ''

Conditions:
  HasAuth: !Not [!Equals [!Ref CognitoUserPoolId, '']]

# ──────────────────────────────────────────────
#  Resources
# ──────────────────────────────────────────────

Resources:

  # ─── DynamoDB Tables ───
  # Free Tier: 25 GB storage, 25 RCU/25 WCU (always free).
  # PAY_PER_REQUEST (on-demand) avoids idle provisioned capacity costs
  # and stays within free tier for dev workloads (<200M requests/mo).

  DeviceTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub nge-iot-devices-${Environment}
      BillingMode: PAY_PER_REQUEST  # Free tier friendly — no capacity to manage
      AttributeDefinitions:
        - AttributeName: thingName
          AttributeType: S
        - AttributeName: deviceId
          AttributeType: N
      KeySchema:
        - AttributeName: thingName
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: deviceId-index
          KeySchema:
            - AttributeName: deviceId
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  AnchorsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub nge-iot-anchors-${Environment}
      BillingMode: PAY_PER_REQUEST  # Free tier friendly — no capacity to manage
      AttributeDefinitions:
        - AttributeName: dataHash
          AttributeType: S
        - AttributeName: deviceId
          AttributeType: N
      KeySchema:
        - AttributeName: dataHash
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: deviceId-index
          KeySchema:
            - AttributeName: deviceId
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  # ─── SQS Dead Letter Queue ───
  # Free Tier: 1M requests/month (always free). DLQ usage is negligible.

  DeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub nge-iot-dlq-${Environment}
      MessageRetentionPeriod: 1209600  # 14 days

  # ─── SNS Error Notifications ───
  # Free Tier: 1M publishes + 1K email deliveries/month (always free).

  ErrorTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub nge-iot-errors-${Environment}

  ErrorSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref ErrorTopic
      Protocol: email
      Endpoint: !Ref NotificationEmail

  # ─── IAM Roles ───

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub nge-iot-lambda-role-${Environment}
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:GetItem
                  - dynamodb:Query
                Resource:
                  - !GetAtt DeviceTable.Arn
                  - !Sub ${DeviceTable.Arn}/index/*
                  - !GetAtt AnchorsTable.Arn
                  - !Sub ${AnchorsTable.Arn}/index/*
        - PolicyName: SecretsAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Ref SignerSecretArn

  IoTRuleRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub nge-iot-rule-role-${Environment}
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: iot.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: LambdaInvoke
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource:
                  - !GetAtt RegisterDeviceLambda.Arn
                  - !GetAtt AnchorDataLambda.Arn
        - PolicyName: ErrorActions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sns:Publish
                  - sqs:SendMessage
                Resource:
                  - !Ref ErrorTopic
                  - !GetAtt DeadLetterQueue.Arn

  # ─── Lambda Functions ───
  # Free Tier: 1M requests + 400K GB-sec/month (always free).
  # Memory is set to minimum needed (128-256 MB) to maximize free tier
  # GB-seconds. At 256 MB, free tier covers ~1.6M seconds of execution.
  # Timeout set conservatively for blockchain transaction confirmation.

  RegisterDeviceLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub nge-iot-register-device-${Environment}
      Runtime: nodejs18.x
      Handler: registerDevice.handler
      Code:
        S3Bucket: !Sub nge-iot-lambda-${Environment}
        S3Key: lambda/registerDevice.zip
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 60       # Blockchain tx confirmation can take 15-30s
      MemorySize: 256   # Minimum for ethers.js + SDK (~19K GB-sec/mo at 75K invocations)
      Environment:
        Variables:
          ETH_RPC_URL: !Ref EthRpcUrl
          CONTRACT_ADDRESS: !Ref ContractAddress
          SIGNER_PRIVATE_KEY: '{{resolve:secretsmanager:nge-iot-signer:SecretString:privateKey}}'
          DYNAMODB_TABLE: !Ref DeviceTable

  AnchorDataLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub nge-iot-anchor-data-${Environment}
      Runtime: nodejs18.x
      Handler: anchorData.handler
      Code:
        S3Bucket: !Sub nge-iot-lambda-${Environment}
        S3Key: lambda/anchorData.zip
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 60       # Blockchain tx confirmation can take 15-30s
      MemorySize: 256   # Minimum for ethers.js + SDK
      Environment:
        Variables:
          ETH_RPC_URL: !Ref EthRpcUrl
          CONTRACT_ADDRESS: !Ref ContractAddress
          SIGNER_PRIVATE_KEY: '{{resolve:secretsmanager:nge-iot-signer:SecretString:privateKey}}'
          DYNAMODB_TABLE: !Ref DeviceTable
          ANCHORS_TABLE: !Ref AnchorsTable

  VerifyAnchorLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub nge-iot-verify-anchor-${Environment}
      Runtime: nodejs18.x
      Handler: verifyAnchor.handler
      Code:
        S3Bucket: !Sub nge-iot-lambda-${Environment}
        S3Key: lambda/verifyAnchor.zip
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 30       # Read-only — faster than write operations
      MemorySize: 128   # Read-only path needs less memory — maximizes free tier
      Environment:
        Variables:
          ETH_RPC_URL: !Ref EthRpcUrl
          CONTRACT_ADDRESS: !Ref ContractAddress
          ANCHORS_TABLE: !Ref AnchorsTable

  # ─── Lambda Permissions (IoT → Lambda) ───

  RegisterDeviceLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref RegisterDeviceLambda
      Action: lambda:InvokeFunction
      Principal: iot.amazonaws.com

  AnchorDataLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref AnchorDataLambda
      Action: lambda:InvokeFunction
      Principal: iot.amazonaws.com

  # ─── AWS IoT Rules ───
  # IoT Core Free Tier: $200 credit for new accounts (12 months).
  # Messaging: $1.00/M messages, Rules: $0.15/M triggered + $0.15/M actions.
  # At 50 devices / 5-min intervals, total IoT cost is ~$1.53/mo — well
  # within the $200 credit. Use Basic Ingest ($aws/rules/...) to skip
  # messaging charges for high-frequency devices if scaling beyond free tier.

  DeviceRegistrationRule:
    Type: AWS::IoT::TopicRule
    Properties:
      RuleName: !Sub nge_device_registration_${Environment}
      TopicRulePayload:
        Description: Routes device registration from IoT Core to blockchain
        Sql: "SELECT thingName, ownerAddress, firmwareHash, metadataUri, tenantId FROM 'nge/devices/register'"
        Actions:
          - Lambda:
              FunctionArn: !GetAtt RegisterDeviceLambda.Arn
        ErrorAction:
          Sns:
            TargetArn: !Ref ErrorTopic
            RoleArn: !GetAtt IoTRuleRole.Arn
            MessageFormat: JSON
        RuleDisabled: false

  DataAnchorRule:
    Type: AWS::IoT::TopicRule
    Properties:
      RuleName: !Sub nge_data_anchor_${Environment}
      TopicRulePayload:
        Description: Routes sensor data from IoT devices to blockchain anchor
        Sql: "SELECT topic(3) AS thingName, * AS payload FROM 'nge/devices/+/data'"
        Actions:
          - Lambda:
              FunctionArn: !GetAtt AnchorDataLambda.Arn
        ErrorAction:
          Sqs:
            QueueUrl: !Ref DeadLetterQueue
            RoleArn: !GetAtt IoTRuleRole.Arn
        RuleDisabled: false

  BatchAnchorRule:
    Type: AWS::IoT::TopicRule
    Properties:
      RuleName: !Sub nge_batch_anchor_${Environment}
      TopicRulePayload:
        Description: Routes batched sensor data to blockchain for gas-efficient anchoring
        Sql: "SELECT topic(3) AS thingName, payloads FROM 'nge/devices/+/data/batch'"
        Actions:
          - Lambda:
              FunctionArn: !GetAtt AnchorDataLambda.Arn
        ErrorAction:
          Sqs:
            QueueUrl: !Ref DeadLetterQueue
            RoleArn: !GetAtt IoTRuleRole.Arn
        RuleDisabled: false

  # ─── API Gateway (Verification Endpoint) ───
  # Using HTTP API (ApiGatewayV2), NOT REST API (ApiGateway).
  # HTTP API is ~71% cheaper ($1.00/M vs $3.50/M) and included in
  # the 12-month free tier (1M requests/month).

  VerifyApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub nge-iot-verify-api-${Environment}
      ProtocolType: HTTP  # HTTP API — cheaper than REST, free tier eligible
      CorsConfiguration:
        AllowOrigins:
          - '*'
        AllowMethods:
          - GET
        AllowHeaders:
          - Content-Type
          - Authorization

  # ─── JWT Authorizer (Cognito) ───
  # Validates Bearer tokens from the Cognito User Pool.
  # Only created when UserPoolArn is provided.

  VerifyApiAuthorizer:
    Type: AWS::ApiGatewayV2::Authorizer
    Condition: HasAuth
    Properties:
      ApiId: !Ref VerifyApi
      AuthorizerType: JWT
      Name: !Sub nge-iot-cognito-authorizer-${Environment}
      IdentitySource: $request.header.Authorization
      JwtConfiguration:
        Audience:
          - !Ref CognitoClientId
        Issuer: !Sub https://cognito-idp.${AWS::Region}.amazonaws.com/${CognitoUserPoolId}

  VerifyApiIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref VerifyApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt VerifyAnchorLambda.Arn
      PayloadFormatVersion: '2.0'

  VerifyApiRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref VerifyApi
      RouteKey: GET /verify
      Target: !Sub integrations/${VerifyApiIntegration}

  VerifyApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref VerifyApi
      StageName: !Ref Environment
      AutoDeploy: true

  VerifyLambdaApiPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref VerifyAnchorLambda
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${VerifyApi}/*/*

  # ─── AWS IoT Thing Type (optional — organizes devices) ───

  NgeDeviceThingType:
    Type: AWS::IoT::ThingType
    Properties:
      ThingTypeName: !Sub NgeDevice-${Environment}
      ThingTypeProperties:
        ThingTypeDescription: NextGen Economy blockchain-registered IoT device
        SearchableAttributes:
          - deviceId
          - firmwareHash
          - ownerAddress

  # ─── AWS IoT Policy (device connection permissions) ───

  NgeDevicePolicy:
    Type: AWS::IoT::Policy
    Properties:
      PolicyName: !Sub nge-device-policy-${Environment}
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - iot:Connect
            Resource:
              - !Sub arn:aws:iot:${AWS::Region}:${AWS::AccountId}:client/${!iot:Connection.Thing.ThingName}
          - Effect: Allow
            Action:
              - iot:Publish
            Resource:
              - !Sub arn:aws:iot:${AWS::Region}:${AWS::AccountId}:topic/nge/devices/${!iot:Connection.Thing.ThingName}/data
              - !Sub arn:aws:iot:${AWS::Region}:${AWS::AccountId}:topic/nge/devices/${!iot:Connection.Thing.ThingName}/data/batch
          - Effect: Allow
            Action:
              - iot:Subscribe
            Resource:
              - !Sub arn:aws:iot:${AWS::Region}:${AWS::AccountId}:topicfilter/nge/devices/${!iot:Connection.Thing.ThingName}/commands

# ──────────────────────────────────────────────
#  Outputs
# ──────────────────────────────────────────────

Outputs:
  VerifyApiEndpoint:
    Description: API endpoint for data verification
    Value: !Sub https://${VerifyApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}/verify

  DeviceTableName:
    Description: DynamoDB table for device mappings
    Value: !Ref DeviceTable

  AnchorsTableName:
    Description: DynamoDB table for data anchors
    Value: !Ref AnchorsTable

  IoTEndpoint:
    Description: Use `aws iot describe-endpoint --endpoint-type iot:Data-ATS` to get the MQTT endpoint
    Value: See AWS CLI command above

  MqttTopics:
    Description: MQTT topic structure
    Value: >
      Registration: nge/devices/register
      Sensor Data:  nge/devices/{thingName}/data
      Batch Data:   nge/devices/{thingName}/data/batch
      Commands:     nge/devices/{thingName}/commands

AWSTemplateFormatVersion: '2010-09-09'
Description: >
  NGE Frontend — S3 static hosting with CloudFront CDN.
  Serves the React single-page application for the NextGen Economy platform.
  Free Tier: S3 (5 GB) + CloudFront (1 TB transfer, 10M requests/mo for 12 months).

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]

Resources:
  # ─── S3 Bucket (Static Site) ───
  # Free Tier: 5 GB storage, 20K GET, 2K PUT/month (always free).
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub nge-frontend-${Environment}-${AWS::AccountId}
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # ─── CloudFront Origin Access Control ───
  FrontendOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub nge-frontend-oac-${Environment}
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # ─── S3 Bucket Policy (CloudFront only) ───
  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowCloudFrontRead
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub ${FrontendBucket.Arn}/*
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub arn:aws:cloudfront::${AWS::AccountId}:distribution/${FrontendDistribution}

  # ─── CloudFront Distribution ───
  # Free Tier: 1 TB data transfer + 10M requests/month (12-month free tier).
  FrontendDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: ''
            OriginAccessControlId: !GetAtt FrontendOAC.Id
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  # CachingOptimized
          Compress: true
        # SPA routing: serve index.html for all 404s
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
        PriceClass: PriceClass_100  # US + Europe only (cheapest)
        HttpVersion: http2and3

Outputs:
  FrontendBucket:
    Description: S3 bucket for frontend build files
    Value: !Ref FrontendBucket

  FrontendUrl:
    Description: CloudFront distribution URL
    Value: !Sub https://${FrontendDistribution.DomainName}

  DistributionId:
    Description: CloudFront distribution ID (for cache invalidation)
    Value: !Ref FrontendDistribution
